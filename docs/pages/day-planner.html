<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #05050f;
            --bg2:       #0a0a1a;
            --bg3:       #0f0f22;
            --green:     #00ff88;
            --green-dim: #00c96a;
            --cyan:      #00e5ff;
            --purple:    #9b5de5;
            --amber:     #ffbe0b;
            --border:    rgba(255,255,255,0.06);
            --border2:   rgba(0,255,136,0.15);
            --text:      #e0e0f0;
            --muted:     #4a4a6a;
            --mono:      'JetBrains Mono', monospace;
            --display:   'Outfit', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--display);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Animated grid background ── */
        .grid-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(0,255,136,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
        }

        /* ── Glow orbs ── */
        .orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
        .orb-1 { width:700px; height:700px; background:radial-gradient(circle,rgba(0,255,136,0.08),transparent 70%); top:-200px; left:-200px; }
        .orb-2 { width:500px; height:500px; background:radial-gradient(circle,rgba(0,229,255,0.07),transparent 70%); bottom:-100px; right:-100px; }
        .orb-3 { width:400px; height:400px; background:radial-gradient(circle,rgba(155,93,229,0.07),transparent 70%); top:50%; left:60%; }

        /* ── Scanline ── */
        body::after {
            content:''; position:fixed; inset:0; z-index:999; pointer-events:none;
            background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
        }

        /* ── Layout ── */
        .wrap { position:relative; z-index:1; max-width:1120px; margin:0 auto; padding:0 32px 100px; }

        /* ── Back btn ── */
        .back-btn {
            display:inline-flex; align-items:center; gap:8px;
            margin:32px 0 0;
            font-family:var(--mono); font-size:0.72rem; letter-spacing:2px;
            color:var(--muted); text-decoration:none; transition:color 0.2s;
        }
        .back-btn:hover { color:var(--green); }
        .back-btn::before { content:'←'; }

        /* ── Top bar ── */
        .topbar {
            display:flex; align-items:center; justify-content:space-between;
            border-bottom:1px solid var(--border);
            padding:16px 0; margin-bottom:48px;
        }
        .topbar-brand { font-family:var(--mono); font-size:0.7rem; letter-spacing:3px; color:var(--muted); text-transform:uppercase; }
        .topbar-right { display:flex; align-items:center; gap:20px; }
        .topbar-date { font-family:var(--mono); font-size:0.68rem; color:var(--muted); }
        .topbar-status { display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:0.68rem; color:var(--green); }
        .status-dot { width:7px; height:7px; background:var(--green); border-radius:50%; box-shadow:0 0 6px var(--green); animation:pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

        /* ── Hero ── */
        .hero { margin-bottom:48px; }
        .hero-eyebrow {
            font-family:var(--mono); font-size:0.72rem; color:var(--green);
            letter-spacing:3px; text-transform:uppercase; margin-bottom:16px;
            display:flex; align-items:center; gap:12px;
        }
        .hero-eyebrow::before { content:''; width:32px; height:1px; background:linear-gradient(90deg,var(--green),transparent); }
        .hero-h1 { font-size:clamp(2.4rem,5vw,4rem); font-weight:900; line-height:0.95; letter-spacing:-2px; color:#fff; margin-bottom:12px; }
        .hero-h1 em { font-style:normal; background:linear-gradient(135deg,var(--green) 0%,var(--cyan) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .hero-sub { font-family:var(--mono); font-size:0.75rem; color:var(--muted); }

        /* ── Tab bar ── */
        .tab-bar {
            display:flex; gap:6px;
            background:var(--bg2); border:1px solid var(--border);
            border-radius:16px; padding:6px; margin-bottom:36px;
        }
        .tab {
            flex:1; padding:12px 16px; background:transparent;
            border:1px solid transparent; border-radius:10px;
            color:var(--muted); font-family:var(--mono); font-size:0.72rem;
            letter-spacing:1px; text-transform:uppercase;
            cursor:pointer; transition:all 0.25s;
            display:flex; align-items:center; justify-content:center; gap:8px;
        }
        .tab:hover { color:var(--text); background:rgba(255,255,255,0.03); border-color:var(--border); }
        .tab .tab-icon { font-size:1rem; }
        .tab .tab-badge {
            font-size:0.65rem; padding:2px 8px; border-radius:20px;
            background:rgba(255,255,255,0.05); color:var(--muted);
        }
        /* Active tab styles */
        .tab.active { color:#fff; border-color:rgba(0,255,136,0.25); background:rgba(0,255,136,0.07); box-shadow:inset 0 1px 0 rgba(255,255,255,0.05); }
        .tab.active .tab-label { color:var(--green); }
        .tab.active .tab-badge { background:rgba(0,255,136,0.12); color:var(--green); }

        .tab.active[data-id="today"][data-cat="learn"] { border-color:rgba(0,229,255,0.25); background:rgba(0,229,255,0.07); }
        .tab.active[data-id="today"][data-cat="learn"] .tab-label { color:var(--cyan); }
        .tab.active[data-id="today"][data-cat="learn"] .tab-badge { background:rgba(0,229,255,0.12); color:var(--cyan); }

        .tab.active[data-id="today"][data-cat="labs"] { border-color:rgba(155,93,229,0.25); background:rgba(155,93,229,0.07); }
        .tab.active[data-id="today"][data-cat="labs"] .tab-label { color:var(--purple); }
        .tab.active[data-id="today"][data-cat="labs"] .tab-badge { background:rgba(155,93,229,0.12); color:var(--purple); }

        .tab.active[data-id="today"][data-cat="hunting"] { border-color:rgba(255,126,0,0.25); background:rgba(255,126,0,0.07); }
        .tab.active[data-id="today"][data-cat="hunting"] .tab-label { color:#f97316; }
        .tab.active[data-id="today"][data-cat="hunting"] .tab-badge { background:rgba(255,126,0,0.12); color:#f97316; }

        .tab.active[data-id="week"] { border-color:rgba(0,229,255,0.25); background:rgba(0,229,255,0.07); }
        .tab.active[data-id="week"] .tab-label { color:var(--cyan); }
        .tab.active[data-id="week"] .tab-badge { background:rgba(0,229,255,0.12); color:var(--cyan); }

        .tab.active[data-id="month"] { border-color:rgba(255,190,11,0.25); background:rgba(255,190,11,0.07); }
        .tab.active[data-id="month"] .tab-label { color:var(--amber); }
        .tab.active[data-id="month"] .tab-badge { background:rgba(255,190,11,0.12); color:var(--amber); }

        /* ── Tab content panes ── */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ── Section heading ── */
        .section-heading { display:flex; align-items:center; gap:18px; margin-bottom:24px; }
        .section-heading-text { font-family:var(--mono); font-size:0.65rem; letter-spacing:3px; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
        .section-heading-line { flex:1; height:1px; background:var(--border); }

        /* ── Cat selector ── */
        .cat-selector-card {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:18px; padding:28px 30px; margin-bottom:24px;
            position:relative; overflow:hidden;
        }
        .cat-selector-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--green),var(--cyan)); }
        .cat-selector-title { font-family:var(--mono); font-size:0.68rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:20px; }
        .cat-options { display:flex; gap:14px; flex-wrap:wrap; }
        .cat-option {
            flex:1; min-width:160px; padding:22px 18px;
            background:var(--bg3); border:1px solid var(--border);
            border-radius:14px; cursor:pointer; transition:all 0.25s;
            text-align:center; display:flex; flex-direction:column; align-items:center; gap:10px;
        }
        .cat-option:hover { transform:translateY(-3px); }
        .cat-option .opt-icon { font-size:2.2rem; }
        .cat-option .opt-label { font-family:var(--mono); font-size:0.85rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
        .cat-option .opt-sub { font-family:var(--mono); font-size:0.65rem; color:rgba(74,74,106,0.7); }
        .cat-option[data-val="learn"]:hover,.cat-option[data-val="learn"].selected { border-color:rgba(0,229,255,0.35); background:rgba(0,229,255,0.06); box-shadow:0 0 24px rgba(0,229,255,0.08); }
        .cat-option[data-val="learn"].selected .opt-label { color:var(--cyan); }
        .cat-option[data-val="labs"]:hover,.cat-option[data-val="labs"].selected { border-color:rgba(155,93,229,0.35); background:rgba(155,93,229,0.06); box-shadow:0 0 24px rgba(155,93,229,0.08); }
        .cat-option[data-val="labs"].selected .opt-label { color:var(--purple); }
        .cat-option[data-val="hunting"]:hover,.cat-option[data-val="hunting"].selected { border-color:rgba(249,115,22,0.35); background:rgba(249,115,22,0.06); box-shadow:0 0 24px rgba(249,115,22,0.08); }
        .cat-option[data-val="hunting"].selected .opt-label { color:#f97316; }
        .no-cat-msg { text-align:center; padding:40px; font-family:var(--mono); font-size:0.75rem; color:var(--muted); letter-spacing:2px; }

        /* ── Day work area ── */
        .day-work-area { --c:var(--green); }

        /* Banner */
        .day-banner {
            background:var(--bg2); border:1px solid rgba(255,255,255,0.08);
            border-radius:18px; padding:24px 28px; margin-bottom:22px;
            display:flex; align-items:center; gap:18px; position:relative; overflow:hidden;
        }
        .day-banner::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,var(--c) 0%,transparent 55%); opacity:0.05; }
        .day-banner::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--c),transparent); }
        .day-banner-icon { font-size:2.8rem; position:relative; z-index:1; }
        .day-banner-info { position:relative; z-index:1; flex:1; }
        .day-banner-title { font-family:var(--display); font-weight:800; font-size:1.5rem; color:var(--c); }
        .day-banner-sub { font-family:var(--mono); font-size:0.68rem; color:var(--muted); margin-top:4px; }
        .change-cat-btn {
            padding:8px 16px; background:rgba(255,255,255,0.03);
            border:1px solid var(--border); border-radius:10px;
            color:var(--muted); font-family:var(--mono); font-size:0.68rem;
            cursor:pointer; transition:all 0.2s; position:relative; z-index:1; letter-spacing:1px;
        }
        .change-cat-btn:hover { border-color:var(--c); color:var(--c); }

        /* Day stats */
        .day-stats {
            display:grid; grid-template-columns:repeat(3,1fr);
            border:1px solid var(--border); border-radius:14px;
            overflow:hidden; margin-bottom:22px; background:var(--bg2);
        }
        .stat-box {
            padding:26px 20px; text-align:center;
            border-right:1px solid var(--border);
            position:relative; overflow:hidden;
        }
        .stat-box:last-child { border-right:none; }
        .stat-box::before { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:linear-gradient(90deg, var(--c), transparent); }
        .stat-box-value { font-family:var(--mono); font-weight:800; font-size:1.9rem; color:var(--c); line-height:1; margin-bottom:8px; }
        .stat-box-label { font-family:var(--mono); font-size:0.65rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }

        /* Stopwatch card */
        .stopwatch-card {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:18px; padding:28px; margin-bottom:24px;
            position:relative; overflow:hidden;
        }
        .stopwatch-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--c),transparent); }
        .stopwatch-card h3 { font-family:var(--mono); font-size:0.72rem; letter-spacing:2px; text-transform:uppercase; color:var(--c); margin-bottom:20px; display:flex; align-items:center; gap:10px; }

        /* Fields */
        .sw-fields { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
        .sw-full { grid-column:1/-1; }
        .field-label { display:block; font-family:var(--mono); color:var(--muted); font-size:0.65rem; font-weight:600; margin-bottom:8px; text-transform:uppercase; letter-spacing:2px; }
        .ifield {
            width:100%; padding:11px 14px;
            background:var(--bg3); border:1px solid var(--border);
            border-radius:10px; color:var(--text);
            font-family:var(--mono); font-size:0.82rem; transition:border-color 0.2s;
        }
        .ifield:focus { outline:none; border-color:var(--c); box-shadow:0 0 0 3px rgba(0,255,136,0.04); }
        .ifield::placeholder { color:var(--muted); }

        /* Clock */
        .sw-display { text-align:center; margin-bottom:22px; }
        .sw-clock {
            font-family:var(--mono); font-size:5rem; letter-spacing:4px;
            color:var(--c); font-variant-numeric:tabular-nums;
            text-shadow:0 0 30px var(--c); line-height:1; transition:color 0.3s,text-shadow 0.3s;
        }
        .sw-clock.running { animation:swPulse 2s ease-in-out infinite; }
        @keyframes swPulse { 0%,100%{opacity:1} 50%{opacity:0.65} }
        .sw-status { font-family:var(--mono); color:var(--muted); font-size:0.7rem; margin-top:8px; letter-spacing:3px; text-transform:uppercase; }
        .sw-status.active { color:var(--c); }

        /* Controls */
        .sw-controls { display:flex; gap:12px; justify-content:center; }
        .sw-btn {
            padding:14px 32px; border:none; border-radius:12px;
            font-family:var(--mono); font-size:0.75rem; letter-spacing:1.5px;
            cursor:pointer; transition:all 0.2s; text-transform:uppercase;
        }
        .sw-btn-start { background:var(--c); color:#05050f; flex:1; font-weight:700; }
        .sw-btn-start:hover { filter:brightness(1.1); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,255,136,0.25); }
        .sw-btn-stop { background:rgba(239,68,68,0.1); color:#ef4444; border:1px solid rgba(239,68,68,0.3); flex:1; display:none; }
        .sw-btn-stop:hover { background:rgba(239,68,68,0.2); }
        .sw-btn-stop.visible { display:block; }
        .sw-btn-reset { background:rgba(255,255,255,0.03); color:var(--muted); border:1px solid var(--border); }
        .sw-btn-reset:hover { border-color:var(--c); color:var(--c); }

        /* Rating */
        .sw-rating-section { margin-top:20px; padding-top:20px; border-top:1px solid var(--border); display:none; }
        .sw-rating-section.visible { display:block; }
        .stars-row { display:flex; gap:8px; justify-content:center; margin-top:8px; }
        .star-btn { font-size:2rem; background:none; border:none; cursor:pointer; opacity:0.2; transition:all 0.15s; line-height:1; }
        .star-btn.lit { opacity:1; filter:drop-shadow(0 0 6px gold); }
        .star-btn:hover { transform:scale(1.2); opacity:0.7; }
        .sw-save-btn { width:100%; padding:14px; margin-top:16px; background:var(--c); color:#05050f; border:none; border-radius:12px; font-family:var(--mono); font-size:0.78rem; letter-spacing:1.5px; text-transform:uppercase; font-weight:700; cursor:pointer; transition:all 0.2s; display:none; }
        .sw-save-btn.visible { display:block; }
        .sw-save-btn:hover { filter:brightness(1.1); transform:translateY(-2px); }

        /* Sessions list */
        .sessions-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .sessions-title { font-family:var(--mono); font-size:0.68rem; letter-spacing:2px; text-transform:uppercase; color:var(--c); display:flex; align-items:center; gap:8px; }
        .sessions-count { background:rgba(255,255,255,0.04); border:1px solid var(--border); padding:4px 12px; border-radius:20px; font-family:var(--mono); font-size:0.65rem; color:var(--muted); }

        .session-card {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:14px; padding:20px 22px; margin-bottom:12px;
            transition:border-color 0.2s; position:relative; border-left:2px solid var(--c);
        }
        .session-card:hover { border-color:var(--c); }
        .session-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; gap:12px; }
        .session-topic { font-family:var(--display); font-weight:700; font-size:1rem; color:#fff; flex:1; }
        .session-stars { font-size:1rem; letter-spacing:1px; color:gold; flex-shrink:0; }
        .session-meta { display:flex; gap:8px; flex-wrap:wrap; }
        .meta-pill { display:flex; align-items:center; gap:5px; background:rgba(255,255,255,0.04); border:1px solid var(--border); padding:4px 10px; border-radius:20px; font-family:var(--mono); font-size:0.68rem; color:var(--muted); }
        .meta-pill.highlight { color:var(--c); border-color:rgba(255,255,255,0.1); }
        .session-link { display:inline-flex; align-items:center; gap:5px; font-family:var(--mono); color:var(--c); font-size:0.72rem; text-decoration:none; opacity:0.7; transition:opacity 0.2s; word-break:break-all; margin-top:10px; }
        .session-link:hover { opacity:1; text-decoration:underline; }
        .session-del { position:absolute; top:12px; right:12px; background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.85rem; padding:4px 8px; border-radius:6px; transition:all 0.2s; }
        .session-del:hover { color:#ef4444; background:rgba(239,68,68,0.1); }

        /* Empty state */
        .empty-state { text-align:center; padding:50px 20px; }
        .empty-state-icon { font-size:3rem; margin-bottom:14px; display:block; }
        .empty-state p { font-family:var(--mono); color:var(--muted); font-size:0.72rem; letter-spacing:1px; line-height:2; }

        /* ── Score pages ── */
        .score-page { --c:var(--green); }

        .score-hero {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:20px; padding:36px; margin-bottom:22px;
            text-align:center; position:relative; overflow:hidden;
        }
        .score-hero::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at 50% 0%,var(--c) 0%,transparent 65%); opacity:0.05; }
        .score-hero::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--c),transparent); }
        .score-hero-label { font-family:var(--mono); color:var(--muted); font-size:0.68rem; text-transform:uppercase; letter-spacing:3px; margin-bottom:12px; position:relative; }
        .score-hero-value { font-family:var(--mono); font-weight:800; font-size:5rem; color:var(--c); line-height:1; text-shadow:0 0 40px var(--c); position:relative; }
        .score-hero-sub { font-family:var(--mono); color:var(--muted); font-size:0.75rem; margin-top:10px; position:relative; letter-spacing:1px; }

        /* Score grid */
        .score-grid {
            display:grid; grid-template-columns:repeat(4,1fr);
            border:1px solid var(--border); border-radius:14px;
            overflow:hidden; margin-bottom:22px; background:var(--bg2);
        }
        .score-card {
            padding:26px 20px; border-right:1px solid var(--border);
            position:relative; overflow:hidden;
        }
        .score-card:last-child { border-right:none; }
        .score-card::before {
            content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
            background:linear-gradient(90deg, var(--c), transparent);
        }
        .score-card-value { font-family:var(--mono); font-weight:800; font-size:1.9rem; color:var(--c); line-height:1; margin-bottom:8px; }
        .score-card-label { font-family:var(--mono); color:var(--muted); font-size:0.65rem; letter-spacing:2px; text-transform:uppercase; }

        /* Breakdown */
        .breakdown-card {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:18px; padding:26px 28px; margin-bottom:18px;
        }
        .breakdown-title { font-family:var(--mono); color:var(--green); font-size:0.68rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
        .breakdown-row { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
        .breakdown-day { width:76px; font-family:var(--mono); font-size:0.72rem; color:var(--muted); flex-shrink:0; }
        .breakdown-bar-wrap { flex:1; }
        .breakdown-bar-track { height:6px; background:rgba(255,255,255,0.04); border-radius:8px; overflow:hidden; }
        .breakdown-bar-fill { height:100%; border-radius:8px; transition:width 0.6s ease; }
        .breakdown-meta { font-family:var(--mono); font-size:0.68rem; color:var(--muted); width:100px; text-align:right; flex-shrink:0; }

        /* Cat breakdown */
        .cat-breakdown { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:18px; }
        .cat-score-card {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:14px; padding:20px; border-left:2px solid var(--cc);
            position:relative; overflow:hidden;
        }
        .cat-score-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,var(--cc),transparent); opacity:0.4; }
        .cat-score-icon { font-size:1.8rem; margin-bottom:10px; }
        .cat-score-label { font-family:var(--mono); font-size:0.65rem; color:var(--cc); margin-bottom:10px; text-transform:uppercase; letter-spacing:2px; }
        .cat-score-sessions { font-family:var(--mono); font-weight:800; font-size:1.4rem; color:#fff; }
        .cat-score-time { font-family:var(--mono); color:var(--muted); font-size:0.72rem; margin-top:4px; }

        /* Heatmap */
        .heatmap-card {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:18px; padding:26px 28px; margin-bottom:18px;
        }
        .heatmap-title { font-family:var(--mono); color:var(--green); font-size:0.68rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:20px; }
        .heatmap-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
        .heatmap-day-label { text-align:center; font-family:var(--mono); font-size:0.62rem; color:var(--muted); padding-bottom:6px; }
        .heatmap-cell { aspect-ratio:1; border-radius:6px; background:rgba(255,255,255,0.03); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:0.7rem; color:var(--muted); cursor:default; transition:all 0.2s; position:relative; }
        .heatmap-cell:hover .heatmap-tooltip { display:block; }
        .heatmap-cell.has-data { border-color:rgba(255,255,255,0.08); }
        .heatmap-cell.today-cell { border-color:var(--green) !important; border-width:2px; color:var(--green); }
        .heatmap-cell.empty-cell { opacity:0.3; }
        .heatmap-tooltip { display:none; position:absolute; bottom:calc(100%+6px); left:50%; transform:translateX(-50%); background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:6px 10px; font-family:var(--mono); font-size:0.65rem; white-space:nowrap; z-index:10; color:var(--text); pointer-events:none; }

        /* ── Entrance animations ── */
        @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        .anim { opacity:0; animation:slideUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards; }
        .d0 { animation-delay:0.05s; } .d1 { animation-delay:0.15s; }
        .d2 { animation-delay:0.25s; } .d3 { animation-delay:0.35s; }

        /* ── Responsive ── */
        @media(max-width:768px) {
            .wrap { padding:0 18px 80px; }
            .cat-options { flex-direction:column; }
            .sw-fields { grid-template-columns:1fr; }
            .day-stats { grid-template-columns:1fr; }
            .day-stats .stat-box { border-right:none; border-bottom:1px solid var(--border); }
            .day-stats .stat-box:last-child { border-bottom:none; }
            .sw-clock { font-size:3.5rem; }
            .score-grid { grid-template-columns:1fr 1fr; }
            .score-grid .score-card:nth-child(2) { border-right:none; }
            .score-grid .score-card:nth-child(3) { border-right:1px solid var(--border); border-top:1px solid var(--border); }
            .score-grid .score-card:nth-child(4) { border-top:1px solid var(--border); }
            .cat-breakdown { grid-template-columns:1fr; }
            .heatmap-cell { font-size:0.55rem; }
            .tab .tab-label { display:none; }
        }
    </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="wrap">

    <!-- Back -->
    <a href="index.html" class="back-btn"> &nbsp;BACK TO HOME</a>

    <!-- Top bar -->
    <div class="topbar anim d0">
        <span class="topbar-brand">LEARNING OS / DAILY PLANNER</span>
        <div class="topbar-right">
            <span class="topbar-date" id="headerDate"></span>
            <span class="topbar-status"><span class="status-dot"></span>TRACKING ACTIVE</span>
        </div>
    </div>

    <!-- Hero -->
    <div class="hero anim d1">
        <div class="hero-eyebrow">Session Tracker</div>
        <h1 class="hero-h1">DAILY<br><em>PLANNER</em></h1>
        <p class="hero-sub">// Track every session. Rate your focus. Own your progress.</p>
    </div>

    <!-- Tab bar -->
    <div class="tab-bar anim d2" id="mainTabs">
        <button class="tab active" data-id="today" onclick="switchMainTab('today')">
            <span class="tab-icon">📍</span>
            <span class="tab-label">Today</span>
            <span class="tab-badge" id="badge-today">—</span>
        </button>
        <button class="tab" data-id="week" onclick="switchMainTab('week')">
            <span class="tab-icon">📊</span>
            <span class="tab-label">Week Score</span>
            <span class="tab-badge" id="badge-week">—</span>
        </button>
        <button class="tab" data-id="month" onclick="switchMainTab('month')">
            <span class="tab-icon">📈</span>
            <span class="tab-label">Month Score</span>
            <span class="tab-badge" id="badge-month">—</span>
        </button>
    </div>

    <!-- Panes -->
    <div id="pane-today" class="tab-content active anim d3"></div>
    <div id="pane-week"  class="tab-content"></div>
    <div id="pane-month" class="tab-content"></div>

</div>

<script>
const DAY_NAMES   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY_SHORT   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const CATS = {
    learn:   { label:'Learn Vulnerability', icon:'🐛', sub:'Study CVEs, concepts & techniques', color:'#00e5ff', topicLabel:'Vulnerability / Topic', topicPH:'e.g., IDOR via BOLA, XSS stored attacks...', linkLabel:'Resource / Link',  linkPH:'https://...', addBtn:'Add Session' },
    labs:    { label:'Solve Labs',           icon:'💻', sub:'PortSwigger, HackTheBox & CTFs',    color:'#9b5de5', topicLabel:'Lab Name',               topicPH:'e.g., SQL Injection UNION attack...',    linkLabel:'Lab URL',        linkPH:'https://portswigger.net/...', addBtn:'Add Lab' },
    hunting: { label:'Hunting',              icon:'🎯', sub:'Bug bounty recon & reporting',      color:'#f97316', topicLabel:'Target / Scope',          topicPH:'e.g., target.com, api.example.com...',  linkLabel:'Program URL',    linkPH:'https://hackerone.com/...', addBtn:'Add Target' }
};

const swState = {};
function getSW() {
    if(!swState['today']) swState['today'] = { running:false, startTs:null, elapsed:0, intervalId:null, stars:0 };
    return swState['today'];
}

const TODAY = new Date();
function todayKey() { return `day-${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}-${String(TODAY.getDate()).padStart(2,'0')}`; }
function dateKey(d)  { return `day-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function getTodayData()  { return JSON.parse(localStorage.getItem(todayKey())||'{"cat":null,"sessions":[]}'); }
function saveTodayData(data) { localStorage.setItem(todayKey(), JSON.stringify(data)); }
function getDateData(d)  { return JSON.parse(localStorage.getItem(dateKey(d))||'{"cat":null,"sessions":[]}'); }

function formatElapsed(secs) {
    if(!secs||secs<=0) return '00:00';
    const h=Math.floor(secs/3600), m=Math.floor((secs%3600)/60), s=secs%60;
    if(h>0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function secsToHuman(secs) {
    if(!secs||secs<=0) return '0m';
    const h=Math.floor(secs/3600), m=Math.floor((secs%3600)/60);
    if(h>0) return `${h}h ${m}m`;
    return `${m}m`;
}

function switchMainTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.id===id));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id===`pane-${id}`));
    if(id==='week')  renderWeekScore();
    if(id==='month') renderMonthScore();
}

function init() {
    document.getElementById('headerDate').textContent =
        TODAY.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    updateBadges();
    renderToday();
}

function updateBadges() {
    const td = getTodayData();
    const todaySessions = (td.sessions||[]).length;
    const b1 = document.getElementById('badge-today');
    if(b1) b1.textContent = todaySessions > 0 ? todaySessions + ' session' + (todaySessions!==1?'s':'') : 'No sessions';

    const now = new Date();
    const startOfWeek = new Date(now); startOfWeek.setDate(now.getDate()-now.getDay());
    let weekActive=0;
    for(let i=0;i<7;i++){ const d=new Date(startOfWeek); d.setDate(startOfWeek.getDate()+i); if((getDateData(d).sessions||[]).length>0) weekActive++; }
    const b2 = document.getElementById('badge-week');
    if(b2) b2.textContent = weekActive + '/7 days';

    const year=now.getFullYear(), month=now.getMonth(), daysInMonth=new Date(year,month+1,0).getDate();
    let monthActive=0;
    for(let day=1;day<=daysInMonth;day++){ const d=new Date(year,month,day); if((getDateData(d).sessions||[]).length>0) monthActive++; }
    const b3 = document.getElementById('badge-month');
    if(b3) b3.textContent = monthActive + '/' + daysInMonth + ' days';
}

function renderToday() {
    const dd = getTodayData();
    const cat = dd.cat;
    const dateStr = TODAY.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    const todayTab = document.querySelector('.tab[data-id="today"]');
    if(todayTab) todayTab.dataset.cat = cat||'';

    const selectorHTML = `
        <div class="cat-selector-card" id="cat-selector" style="${cat?'display:none':''}">
            <div class="cat-selector-title">// ${dateStr} — What will you do today?</div>
            <div class="cat-options">
                ${Object.entries(CATS).map(([key,cfg])=>`
                    <div class="cat-option ${cat===key?'selected':''}" data-val="${key}" onclick="selectCat('${key}')">
                        <div class="opt-icon">${cfg.icon}</div>
                        <div class="opt-label">${cfg.label}</div>
                        <div class="opt-sub">${cfg.sub}</div>
                    </div>`).join('')}
            </div>
        </div>`;

    if(!cat){
        document.getElementById('pane-today').innerHTML = selectorHTML + `<div class="no-cat-msg">↑ PICK A CATEGORY ABOVE TO START YOUR SESSION</div>`;
        return;
    }

    const cfg = CATS[cat];
    const sessions = dd.sessions||[];
    const totalSecs = sessions.reduce((a,s)=>a+(s.elapsed||0),0);
    const avgRating = sessions.length ? sessions.reduce((a,s)=>a+(s.rating||0),0)/sessions.length : 0;
    const sw = getSW();

    document.getElementById('pane-today').innerHTML = selectorHTML + `
        <div class="day-work-area" style="--c:${cfg.color}">
            <div class="day-banner" style="--c:${cfg.color}">
                <div class="day-banner-icon">${cfg.icon}</div>
                <div class="day-banner-info">
                    <div class="day-banner-title">${cfg.label}</div>
                    <div class="day-banner-sub">// ${dateStr} · ${cfg.sub}</div>
                </div>
                <button class="change-cat-btn" onclick="changeCat()">✏️ CHANGE</button>
            </div>

            <div class="day-stats">
                <div class="stat-box" style="--c:${cfg.color}">
                    <div class="stat-box-value" id="stat-count">${sessions.length}</div>
                    <div class="stat-box-label">Sessions</div>
                </div>
                <div class="stat-box" style="--c:${cfg.color}">
                    <div class="stat-box-value" id="stat-time" style="font-size:1.4rem">${secsToHuman(totalSecs)}</div>
                    <div class="stat-box-label">Total Time</div>
                </div>
                <div class="stat-box" style="--c:${cfg.color}">
                    <div class="stat-box-value" id="stat-rating" style="font-size:${sessions.length?'1.2rem':'1.8rem'}">${sessions.length?'★'.repeat(Math.round(avgRating))+'☆'.repeat(5-Math.round(avgRating)):'—'}</div>
                    <div class="stat-box-label">Avg Rating</div>
                </div>
            </div>

            <div class="stopwatch-card" style="--c:${cfg.color}">
                <h3>⏱ ${cfg.addBtn}</h3>
                <div class="sw-fields">
                    <div class="sw-full">
                        <label class="field-label">${cfg.topicLabel}</label>
                        <input class="ifield" id="sw-topic" type="text" placeholder="${cfg.topicPH}">
                    </div>
                    <div class="sw-full">
                        <label class="field-label">${cfg.linkLabel}</label>
                        <input class="ifield" id="sw-link" type="url" placeholder="${cfg.linkPH}">
                    </div>
                </div>
                <div class="sw-display">
                    <div class="sw-clock ${sw.running?'running':''}" id="sw-clock">${formatElapsed(sw.elapsed)}</div>
                    <div class="sw-status ${sw.running?'active':''}" id="sw-status">${sw.running?'● RUNNING':'● STOPPED'}</div>
                </div>
                <div class="sw-controls">
                    <button class="sw-btn sw-btn-start" id="sw-start" onclick="swStart()" style="${sw.running?'display:none':''}">▶ START</button>
                    <button class="sw-btn sw-btn-stop ${sw.running?'visible':''}" id="sw-stop" onclick="swStop()" style="${sw.running?'':'display:none'}">■ STOP</button>
                    <button class="sw-btn sw-btn-reset" onclick="swReset()">↺ RESET</button>
                </div>
                <div class="sw-rating-section ${!sw.running && sw.elapsed>0?'visible':''}" id="sw-rating">
                    <label class="field-label" style="text-align:center;display:block;">⭐ How did it go?</label>
                    <div class="stars-row" id="sw-stars">
                        ${[1,2,3,4,5].map(n=>`<button class="star-btn ${sw.stars>=n?'lit':''}" onclick="swSetStars(${n})" type="button">★</button>`).join('')}
                    </div>
                    <button class="sw-save-btn ${!sw.running&&sw.elapsed>0?'visible':''}" id="sw-save" onclick="swSave()" style="background:${cfg.color}">💾 SAVE SESSION</button>
                </div>
            </div>

            <div class="sessions-header">
                <div class="sessions-title" style="--c:${cfg.color}">📁 Today's Sessions</div>
                <div class="sessions-count" id="scount">${sessions.length} session${sessions.length!==1?'s':''}</div>
            </div>
            <div id="sessions-list">${renderSessionsHTML(sessions, cfg.color)}</div>
        </div>`;
}

function renderSessionsHTML(sessions, color) {
    if(!sessions.length) return `<div class="empty-state"><span class="empty-state-icon">⏱</span><p>NO SESSIONS YET<br>Start the stopwatch above to begin tracking</p></div>`;
    return [...sessions].reverse().map(s=>{
        const filled=Math.round(s.rating||0);
        return `<div class="session-card" style="--c:${color}">
            <button class="session-del" onclick="deleteSession(${s.id})">✕</button>
            <div class="session-top">
                <div class="session-topic">${s.topic||'Untitled Session'}</div>
                <div class="session-stars">${'★'.repeat(filled)+'☆'.repeat(5-filled)}</div>
            </div>
            <div class="session-meta">
                <div class="meta-pill highlight">⏱ ${secsToHuman(s.elapsed)}</div>
                <div class="meta-pill">🕐 ${s.loggedAt}</div>
            </div>
            ${s.link?`<a href="${s.link}" target="_blank" class="session-link">🔗 ${s.link}</a>`:''}
        </div>`;
    }).join('');
}

function swStart() {
    const sw=getSW(); if(sw.running) return;
    sw.running=true; sw.startTs=Date.now()-sw.elapsed*1000;
    sw.intervalId=setInterval(()=>{ sw.elapsed=Math.floor((Date.now()-sw.startTs)/1000); const el=document.getElementById('sw-clock'); if(el) el.textContent=formatElapsed(sw.elapsed); },1000);
    const c=document.getElementById('sw-clock'), s=document.getElementById('sw-status');
    const st=document.getElementById('sw-start'), sp=document.getElementById('sw-stop'), r=document.getElementById('sw-rating');
    if(c) c.classList.add('running'); if(s){s.textContent='● RUNNING';s.classList.add('active');}
    if(st) st.style.display='none'; if(sp){sp.style.display='block';sp.classList.add('visible');}
    if(r) r.classList.remove('visible');
}

function swStop() {
    const sw=getSW(); if(!sw.running) return;
    clearInterval(sw.intervalId); sw.running=false;
    sw.elapsed=Math.floor((Date.now()-sw.startTs)/1000);
    const c=document.getElementById('sw-clock'), s=document.getElementById('sw-status');
    const st=document.getElementById('sw-start'), sp=document.getElementById('sw-stop');
    const r=document.getElementById('sw-rating'), sv=document.getElementById('sw-save');
    if(c){c.textContent=formatElapsed(sw.elapsed);c.classList.remove('running');}
    if(s){s.textContent='● STOPPED';s.classList.remove('active');}
    if(st) st.style.display='block'; if(sp){sp.style.display='none';sp.classList.remove('visible');}
    if(r&&sw.elapsed>0) r.classList.add('visible');
    if(sv&&sw.elapsed>0) sv.classList.add('visible');
}

function swReset() {
    const sw=getSW(); clearInterval(sw.intervalId);
    sw.running=false; sw.elapsed=0; sw.startTs=null; sw.stars=0;
    const c=document.getElementById('sw-clock'), s=document.getElementById('sw-status');
    const st=document.getElementById('sw-start'), sp=document.getElementById('sw-stop');
    const r=document.getElementById('sw-rating'), stars=document.getElementById('sw-stars');
    if(c){c.textContent='00:00';c.classList.remove('running');}
    if(s){s.textContent='● STOPPED';s.classList.remove('active');}
    if(st) st.style.display='block'; if(sp){sp.style.display='none';sp.classList.remove('visible');}
    if(r) r.classList.remove('visible');
    if(stars) stars.querySelectorAll('.star-btn').forEach(b=>b.classList.remove('lit'));
}

function swSetStars(n) {
    getSW().stars=n;
    const row=document.getElementById('sw-stars');
    if(row) row.querySelectorAll('.star-btn').forEach((b,i)=>b.classList.toggle('lit',i<n));
}

function swSave() {
    const sw=getSW(); if(sw.elapsed===0) return;
    const topic=document.getElementById('sw-topic')?.value.trim();
    const link=document.getElementById('sw-link')?.value.trim();
    const now=new Date();
    const dd=getTodayData();
    dd.sessions.push({ id:Date.now(), topic:topic||'Untitled Session', link, rating:sw.stars, elapsed:sw.elapsed, loggedAt:now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) });
    saveTodayData(dd);
    const t=document.getElementById('sw-topic'), l=document.getElementById('sw-link');
    if(t) t.value=''; if(l) l.value='';
    swReset(); refreshTodayUI(); updateBadges();
}

function deleteSession(id) {
    if(!confirm('Delete this session?')) return;
    const dd=getTodayData(); dd.sessions=dd.sessions.filter(s=>s.id!==id);
    saveTodayData(dd); refreshTodayUI();
}

function selectCat(catKey) {
    const dd=getTodayData(); dd.cat=catKey; if(!dd.sessions) dd.sessions=[];
    saveTodayData(dd); renderToday();
}

function changeCat() {
    const dd=getTodayData(); dd.cat=null; saveTodayData(dd); renderToday();
}

function refreshTodayUI() {
    const dd=getTodayData(); const sessions=dd.sessions||[]; const cat=dd.cat; if(!cat) return;
    const cfg=CATS[cat];
    const totalSecs=sessions.reduce((a,s)=>a+(s.elapsed||0),0);
    const avgR=sessions.length?sessions.reduce((a,s)=>a+(s.rating||0),0)/sessions.length:0;
    const filled=Math.round(avgR);
    const q=id=>document.getElementById(id);
    if(q('stat-count'))   q('stat-count').textContent=sessions.length;
    if(q('stat-time'))    q('stat-time').textContent=secsToHuman(totalSecs);
    if(q('stat-rating'))  q('stat-rating').textContent=sessions.length?'★'.repeat(filled)+'☆'.repeat(5-filled):'—';
    if(q('scount'))       q('scount').textContent=`${sessions.length} session${sessions.length!==1?'s':''}`;
    if(q('sessions-list')) q('sessions-list').innerHTML=renderSessionsHTML(sessions,cfg.color);
}

// ── WEEK SCORE ────────────────────────────────────────
function renderWeekScore() {
    const pane = document.getElementById('pane-week');
    const now = new Date();
    const weekDays = [];
    const startOfWeek = new Date(now); startOfWeek.setDate(now.getDate()-now.getDay());
    for(let i=0;i<7;i++){ const d=new Date(startOfWeek); d.setDate(startOfWeek.getDate()+i); weekDays.push(d); }

    let totalSecs=0,totalSessions=0,totalDaysActive=0;
    const catTotals={learn:{secs:0,sessions:0},labs:{secs:0,sessions:0},hunting:{secs:0,sessions:0}};
    const dayBreakdown=[];
    let allRatings=[];

    weekDays.forEach(d=>{
        const dd=getDateData(d); const sessions=dd.sessions||[];
        const secs=sessions.reduce((a,s)=>a+(s.elapsed||0),0);
        const isT=d.toDateString()===now.toDateString();
        totalSecs+=secs; totalSessions+=sessions.length;
        if(sessions.length>0) totalDaysActive++;
        sessions.forEach(s=>{ if(s.rating) allRatings.push(s.rating); });
        if(dd.cat&&catTotals[dd.cat]){ catTotals[dd.cat].secs+=secs; catTotals[dd.cat].sessions+=sessions.length; }
        dayBreakdown.push({ label:DAY_SHORT[d.getDay()], date:d.getDate(), secs, sessions:sessions.length, isToday:isT, cat:dd.cat });
    });

    const avgRating=allRatings.length?(allRatings.reduce((a,b)=>a+b,0)/allRatings.length):0;
    const maxSecs=Math.max(...dayBreakdown.map(d=>d.secs),1);
    const scorePercent=Math.round((totalDaysActive/7)*100);

    pane.innerHTML = `
        <div class="score-page" style="--c:var(--cyan)">
            <div class="score-hero" style="--c:var(--cyan)">
                <div class="score-hero-label">Week Activity Score</div>
                <div class="score-hero-value" style="color:var(--cyan);text-shadow:0 0 40px var(--cyan)">${scorePercent}%</div>
                <div class="score-hero-sub">${totalDaysActive} of 7 days active · ${secsToHuman(totalSecs)} total</div>
            </div>
            <div class="score-grid">
                <div class="score-card" style="--c:var(--green)"><div class="score-card-value" style="color:var(--green)">${totalSessions}</div><div class="score-card-label">Total Sessions</div></div>
                <div class="score-card" style="--c:var(--cyan)"><div class="score-card-value" style="color:var(--cyan)">${secsToHuman(totalSecs)}</div><div class="score-card-label">Time Studied</div></div>
                <div class="score-card" style="--c:var(--purple)"><div class="score-card-value" style="color:var(--purple)">${totalDaysActive}</div><div class="score-card-label">Active Days</div></div>
                <div class="score-card" style="--c:var(--amber)"><div class="score-card-value" style="color:var(--amber);font-size:${avgRating?'1.2rem':'1.6rem'}">${avgRating?'★'.repeat(Math.round(avgRating))+'☆'.repeat(5-Math.round(avgRating)):'—'}</div><div class="score-card-label">Avg Rating</div></div>
            </div>
            <div class="cat-breakdown">
                ${Object.entries(catTotals).map(([key,data])=>{
                    const cfg=CATS[key];
                    return `<div class="cat-score-card" style="--cc:${cfg.color}">
                        <div class="cat-score-icon">${cfg.icon}</div>
                        <div class="cat-score-label">${cfg.label}</div>
                        <div class="cat-score-sessions">${data.sessions}</div>
                        <div class="cat-score-time">${secsToHuman(data.secs)}</div>
                    </div>`;
                }).join('')}
            </div>
            <div class="breakdown-card">
                <div class="breakdown-title">📅 Daily Breakdown</div>
                ${dayBreakdown.map(d=>{
                    const pct=Math.round((d.secs/maxSecs)*100);
                    const color=d.cat?CATS[d.cat].color:'#2a2a4a';
                    const todayMark=d.isToday?' 📍':'';
                    return `<div class="breakdown-row">
                        <div class="breakdown-day" style="color:${d.isToday?'var(--green)':'var(--muted)'}">${d.label} ${d.date}${todayMark}</div>
                        <div class="breakdown-bar-wrap"><div class="breakdown-bar-track"><div class="breakdown-bar-fill" style="width:${pct}%;background:${color}"></div></div></div>
                        <div class="breakdown-meta">${d.sessions>0?`${d.sessions} sess · ${secsToHuman(d.secs)}`:'—'}</div>
                    </div>`;
                }).join('')}
            </div>
        </div>`;
}

// ── MONTH SCORE ───────────────────────────────────────
function renderMonthScore() {
    const pane = document.getElementById('pane-month');
    const now = new Date();
    const year=now.getFullYear(), month=now.getMonth();
    const daysInMonth=new Date(year,month+1,0).getDate();
    const firstDay=new Date(year,month,1).getDay();

    let totalSecs=0,totalSessions=0,totalDaysActive=0;
    const catTotals={learn:{secs:0,sessions:0},labs:{secs:0,sessions:0},hunting:{secs:0,sessions:0}};
    let allRatings=[];
    const dayData={};

    for(let day=1;day<=daysInMonth;day++){
        const d=new Date(year,month,day);
        const dd=getDateData(d); const sessions=dd.sessions||[];
        const secs=sessions.reduce((a,s)=>a+(s.elapsed||0),0);
        totalSecs+=secs; totalSessions+=sessions.length;
        if(sessions.length>0) totalDaysActive++;
        sessions.forEach(s=>{ if(s.rating) allRatings.push(s.rating); });
        if(dd.cat&&catTotals[dd.cat]){ catTotals[dd.cat].secs+=secs; catTotals[dd.cat].sessions+=sessions.length; }
        dayData[day]={secs,sessions:sessions.length,cat:dd.cat};
    }

    const avgRating=allRatings.length?allRatings.reduce((a,b)=>a+b,0)/allRatings.length:0;
    const scorePercent=Math.round((totalDaysActive/daysInMonth)*100);
    const maxSecs=Math.max(...Object.values(dayData).map(d=>d.secs),1);

    const dayLabels=DAY_SHORT.map(d=>`<div class="heatmap-day-label">${d}</div>`).join('');
    let cells='';
    for(let i=0;i<firstDay;i++) cells+=`<div class="heatmap-cell empty-cell"></div>`;
    for(let day=1;day<=daysInMonth;day++){
        const d=dayData[day];
        const isToday=day===now.getDate();
        const intensity=d.secs>0?Math.max(0.15,d.secs/maxSecs):0;
        const color=d.cat?CATS[d.cat].color:'#00ff88';
        const bg=d.secs>0?`rgba(${hexToRgb(color)},${intensity.toFixed(2)})`:'rgba(10,10,26,0.8)';
        const tooltip=d.secs>0?`${day} — ${d.sessions} sess, ${secsToHuman(d.secs)}`:`${day} — No activity`;
        cells+=`<div class="heatmap-cell ${d.secs>0?'has-data':''} ${isToday?'today-cell':''}" style="background:${bg}">
            ${day}<div class="heatmap-tooltip">${tooltip}</div>
        </div>`;
    }

    pane.innerHTML = `
        <div class="score-page" style="--c:var(--amber)">
            <div class="score-hero" style="--c:var(--amber)">
                <div class="score-hero-label">${MONTH_NAMES[month]} ${year} — Month Score</div>
                <div class="score-hero-value" style="color:var(--amber);text-shadow:0 0 40px var(--amber)">${scorePercent}%</div>
                <div class="score-hero-sub">${totalDaysActive} of ${daysInMonth} days active · ${secsToHuman(totalSecs)} total</div>
            </div>
            <div class="score-grid">
                <div class="score-card" style="--c:var(--green)"><div class="score-card-value" style="color:var(--green)">${totalSessions}</div><div class="score-card-label">Total Sessions</div></div>
                <div class="score-card" style="--c:var(--cyan)"><div class="score-card-value" style="color:var(--cyan)">${secsToHuman(totalSecs)}</div><div class="score-card-label">Time Studied</div></div>
                <div class="score-card" style="--c:var(--purple)"><div class="score-card-value" style="color:var(--purple)">${totalDaysActive}</div><div class="score-card-label">Active Days</div></div>
                <div class="score-card" style="--c:var(--amber)"><div class="score-card-value" style="color:var(--amber);font-size:${avgRating?'1.2rem':'1.6rem'}">${avgRating?'★'.repeat(Math.round(avgRating))+'☆'.repeat(5-Math.round(avgRating)):'—'}</div><div class="score-card-label">Avg Rating</div></div>
            </div>
            <div class="cat-breakdown">
                ${Object.entries(catTotals).map(([key,data])=>{
                    const cfg=CATS[key];
                    return `<div class="cat-score-card" style="--cc:${cfg.color}">
                        <div class="cat-score-icon">${cfg.icon}</div>
                        <div class="cat-score-label">${cfg.label}</div>
                        <div class="cat-score-sessions">${data.sessions}</div>
                        <div class="cat-score-time">${secsToHuman(data.secs)}</div>
                    </div>`;
                }).join('')}
            </div>
            <div class="heatmap-card">
                <div class="heatmap-title">🗓 Activity Heatmap — ${MONTH_NAMES[month]}</div>
                <div class="heatmap-grid">${dayLabels}${cells}</div>
                <div style="display:flex;align-items:center;gap:8px;margin-top:14px;font-family:var(--mono);font-size:0.65rem;color:var(--muted);">
                    <span>Less</span>
                    <div style="width:16px;height:16px;border-radius:4px;background:rgba(0,255,136,0.1)"></div>
                    <div style="width:16px;height:16px;border-radius:4px;background:rgba(0,255,136,0.3)"></div>
                    <div style="width:16px;height:16px;border-radius:4px;background:rgba(0,255,136,0.6)"></div>
                    <div style="width:16px;height:16px;border-radius:4px;background:rgba(0,255,136,0.9)"></div>
                    <span>More</span>
                    <span style="margin-left:12px;">📍 = Today</span>
                </div>
            </div>
        </div>`;
}

function hexToRgb(hex) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
